<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С 8 марта!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --rose: #e8536a; --ivory: #fff8f5; --gold: #d4a84b; --deep: #3a1a24; }
    body { background: var(--ivory); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Cormorant Garamond', serif; }
    .petals-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .petal { position: absolute; top: -60px; font-size: 1.4rem; animation: fall linear infinite; opacity: 0.7; }
    @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 0.8; } 50% { transform: translateY(50vh) rotate(180deg) translateX(30px); opacity: 0.5; } 100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); opacity: 0; } }
    .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
    .blob1 { width: 500px; height: 500px; background: var(--rose); top: -100px; left: -100px; animation: blob-float 8s ease-in-out infinite; }
    .blob2 { width: 400px; height: 400px; background: #f5a7b8; bottom: -80px; right: -80px; animation: blob-float 10s ease-in-out infinite reverse; }
    .blob3 { width: 300px; height: 300px; background: var(--gold); top: 50%; left: 50%; animation: blob-float 12s ease-in-out infinite 2s; }
    @keyframes blob-float { 0%,100% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.1) translate(20px,-20px); } }
    .card { position: relative; z-index: 1; background: rgba(255,255,255,0.72); backdrop-filter: blur(20px); border: 1px solid rgba(232,83,106,0.18); border-radius: 32px; padding: 60px 56px 52px; max-width: 560px; width: 90vw; text-align: center; box-shadow: 0 24px 80px rgba(232,83,106,0.12); animation: card-in 1.2s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes card-in { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .card::before { content: ''; display: block; width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 32px; }
    .emoji-row { font-size: 2.4rem; margin-bottom: 24px; animation: bounce-in 1s 0.3s both; letter-spacing: 4px; }
    @keyframes bounce-in { 0% { opacity: 0; transform: scale(0.5); } 70% { transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 6vw, 3.4rem); font-weight: 700; color: var(--rose); line-height: 1.15; animation: text-in 1s 0.5s both; margin-bottom: 20px; }
    h1 span { color: var(--gold); font-style: italic; }
    @keyframes text-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .subtitle { font-size: 1.15rem; color: #b06070; font-style: italic; font-weight: 300; margin-bottom: 40px; animation: text-in 1s 0.7s both; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 0 auto 36px; width: 260px; animation: text-in 1s 0.8s both; }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
    .divider-line:last-child { background: linear-gradient(270deg, transparent, var(--gold)); }
    .divider-icon { color: var(--gold); font-size: 1rem; }
    .player { background: linear-gradient(135deg, rgba(232,83,106,0.08), rgba(212,168,75,0.08)); border: 1px solid rgba(232,83,106,0.15); border-radius: 20px; padding: 24px 28px; animation: text-in 1s 1s both; }
    .song-info { margin-bottom: 18px; }
    .song-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--deep); font-weight: 600; margin-bottom: 2px; }
    .song-artist { font-size: 0.85rem; color: #b06070; font-style: italic; }
    .progress-wrap { height: 4px; background: rgba(232,83,106,0.15); border-radius: 2px; margin-bottom: 14px; cursor: pointer; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); border-radius: 2px; width: 0%; transition: width 0.3s linear; }
    .time-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: #b06070; margin-bottom: 18px; }
    .controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
    .btn { background: none; border: none; cursor: pointer; color: var(--rose); transition: transform 0.15s; font-size: 1.3rem; padding: 0; }
    .btn:hover { transform: scale(1.15); color: var(--gold); }
    .btn-play { width: 52px; height: 52px; background: linear-gradient(135deg, var(--rose), #c9364f); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 24px rgba(232,83,106,0.4); }
    .volume-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; justify-content: center; }
    .volume-icon { font-size: 0.9rem; color: #b06070; }
    input[type=range] { -webkit-appearance: none; width: 100px; height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--rose) 80%, rgba(232,83,106,0.2) 80%); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--rose); }
    .sparkle { position: fixed; pointer-events: none; font-size: 1rem; animation: sparkle-fly 2s ease-out forwards; z-index: 99; }
    @keyframes sparkle-fly { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }
  </style>
</head>
